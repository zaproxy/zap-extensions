name: Java CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency: 
  group:  ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        java: [17, 19, 21]
        include:
          - os: windows-latest
            java: 17
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-disabled: true
          gradle-home-cache-includes: |
            caches
            caches/zap-wd
            notifications
      - uses: actions/cache@v6
        with:
          path: |
           ${{ env.GRADLE_USER_HOME }}/caches
           ${{ env.GRADLE_USER_HOME }}/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.java }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.java }}-
            ${{ runner.os }}-gradle-
      - run: ./gradlew "-Dorg.gradle.jvmargs=-Xmx4g" assemble
        env:
          ZAP_WD_CACHE: 1
      - run: ./gradlew check
      - run: ./gradlew --stop
