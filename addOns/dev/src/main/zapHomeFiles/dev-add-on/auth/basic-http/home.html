<!DOCTYPE html>
<html lang="en">
<head>
	<title>ZAP Test Server - HTTP Basic Auth Home</title>
	<link href="/tutorial.css" rel="stylesheet" type="text/css" />
</head>
<body>
<h1>Protected Home Page</h1>
<div class="roundContainer">
	<div id="message"></div>
</div>

<script>
function getuser() {
	var xhr = new XMLHttpRequest();
	var url = "user";
	xhr.open("GET", url, true);
	xhr.onreadystatechange = function () {
	    if (xhr.readyState === 4 && xhr.status === 200) {
	        var json = JSON.parse(xhr.responseText);
	        
	        if (json.result === "OK") {
	        	const h2 = document.createElement("h2");
	        	const textNode = document.createTextNode("Hello " + json.user);
	        	h2.appendChild(textNode);
	        	document.getElementById("message").appendChild(h2);
	        } else {
	        	window.location.replace("index.html");
	        }
	    }
	};
	xhr.send(null);
}
window.addEventListener("load", function () {
	getuser();
});
</script>

<p>
Protected by creds so that it can be used to test authenticated spidering.
</p>
<p>
<a href="index.html">Back to index</a>
</p>
</body>
</html>
