openapi: 3.1.0
info:
  title: OpenAPI 3.1 Array Body Test
  version: 1.0.0
paths:
  /array-of-objects:
    post:
      operationId: createItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Item'
      responses:
        '200':
          description: OK
  /array-of-strings:
    post:
      operationId: createStrings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        '200':
          description: OK
components:
  schemas:
    Item:
      type: object
      properties:
        name:
          type: string
        value:
          type: integer
