llm.chat.panel.actions.prompt.text = Please propose ZAP actions in JSON between {0} and {1}. Return a JSON object with an "actions" array. In the JSON block output strict JSON only (no markdown, no bullets, no code fences, no comments). Supported actions: set_history_note (history_id, note), add_history_tags (history_id, tags), open_requester_dialog (history_id or request, location, start, end, payload), open_requester_tab (history_id or request, location, start, end, payload), open_fuzzer (history_id or request, location, start, end, payloads). Aliases also accepted: open_request_editor (open_requester_dialog), open_requester (open_requester_tab), open_http_fuzzer (open_fuzzer).
llm.chat.panel.payloads.prompt.text = For the selection above, briefly explain typical attack vectors and propose a compact list of payloads. Then include ZAP actions in JSON between {0} and {1} to: (1) open Request Editor with the first payload inserted, (2) open Requester with the first payload inserted, (3) open the HTTP Fuzzer with the payload list. In the JSON block output strict JSON only (no markdown, no bullets, no code fences, no comments). Use location "request_header" or "request_body" and provide start/end offsets matching the selection.
llm.chat.panel.payloads.prompt.editor.text = For the selection above, briefly explain typical attack vectors and propose a compact list of payloads. Then include ZAP actions in JSON between {0} and {1} to open Request Editor with the first payload inserted. Return only the JSON block between the markers (no additional actions). In the JSON block output strict JSON only (no markdown, no bullets, no code fences, no comments). Use location "request_header" or "request_body" and provide start/end offsets matching the selection.
llm.chat.panel.payloads.prompt.requester.text = For the selection above, briefly explain typical attack vectors and propose a compact list of payloads. Then include ZAP actions in JSON between {0} and {1} to open the Requester tab with the first payload inserted. Return only the JSON block between the markers (no additional actions). In the JSON block output strict JSON only (no markdown, no bullets, no code fences, no comments). Use location "request_header" or "request_body" and provide start/end offsets matching the selection.
llm.chat.panel.payloads.prompt.fuzzer.text = For the selection above, briefly explain typical attack vectors and propose a compact list of payloads. Then include ZAP actions in JSON between {0} and {1} to open the HTTP Fuzzer with the payload list. Return only the JSON block between the markers (no additional actions). In the JSON block output strict JSON only (no markdown, no bullets, no code fences, no comments). Use location "request_header" or "request_body" and provide start/end offsets matching the selection.
