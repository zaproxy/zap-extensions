  - type: mcp-config                   # Configure the MCP server
    parameters:
      enabled:                         # Bool: Enable the MCP server, default: true
      port:                            # Int: Port for the MCP HTTP listener, default: 8282
      securityKeyEnabled:              # Bool: Require a security key in the Authorization header, default: true
      securityKey:                     # String: The security key value (leave blank to keep the current key)
