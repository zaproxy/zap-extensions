mcp.tool.startactivescan.error.missingtarget = The target parameter is required
mcp.tool.startactivescan.error.noactivescan = Active scan job not available (ascan add-on may not be installed)
mcp.tool.startactivescan.param.policy = Optional scan policy name (see zap\://scan-policies resource for available policies)
mcp.tool.startactivescan.param.target = The target\: a URL to scan (creates a temporary context) or the name of an existing context
mcp.tool.startactivescan.success = Active scan started (scan_id\: {0})

